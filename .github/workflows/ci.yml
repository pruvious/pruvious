name: ci

on:
  push:
    paths-ignore:
      - '*.md'
    branches:
      - v4
  pull_request:
    paths-ignore:
      - '*.md'
    branches:
      - v4

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Bootstrap monorepo
        run: pnpm bootstrap

      - name: Install dependencies (and build afterwards)
        run: pnpm install

      - name: Publish on pkg.pr.new
        run: pnpm pkg-pr-new publish './packages/*'
